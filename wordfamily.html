<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordFamily Pro - Fixed Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .word-card { animation: fadeIn 0.3s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
            <h2 class="text-3xl font-extrabold mb-2 tracking-tighter">WF<span class="text-indigo-500">.PRO</span></h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 ring-indigo-500/50">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-8 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 ring-indigo-500/50">
            <div class="flex gap-3">
                <button onclick="authAction('login')" class="flex-1 bg-indigo-600 p-4 rounded-2xl font-bold">Vào App</button>
                <button onclick="authAction('reg')" class="flex-1 border border-white/10 p-4 rounded-2xl">Đăng ký</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
            <h1 class="text-4xl font-extrabold tracking-tighter">WORD<span class="text-indigo-500">FAMILY</span></h1>
            <div class="relative w-full md:w-[500px]">
                <input type="text" id="wordInput" onkeypress="if(event.key==='Enter') findWF()" placeholder="Nhập từ cần tra..." class="w-full p-5 bg-white/5 border border-white/10 rounded-[2rem] outline-none">
                <button onclick="findWF()" class="absolute right-3 top-3 bg-indigo-500 text-white px-8 py-2.5 rounded-[1.5rem] font-bold">Phân tích</button>
            </div>
            <button onclick="firebase.auth().signOut()" class="text-xs font-bold text-gray-500 uppercase">Đăng xuất</button>
        </header>

        <section id="results" class="hidden">
            <div class="mb-12 text-center">
                <h2 id="rootWord" class="text-7xl font-black uppercase tracking-tighter text-white"></h2>
                <div id="ipa" class="text-xl text-indigo-300/60 mt-4 italic"></div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-indigo-500">
                    <span class="text-indigo-400 font-black uppercase text-[10px] mb-6 block">Động từ (Verb)</span>
                    <div id="v-list" class="space-y-3"></div>
                </div>
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-emerald-500">
                    <span class="text-emerald-400 font-black uppercase text-[10px] mb-6 block">Danh từ (Noun)</span>
                    <div id="n-list" class="space-y-3"></div>
                </div>
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-amber-500">
                    <span class="text-amber-400 font-black uppercase text-[10px] mb-6 block">Tính từ (Adj)</span>
                    <div id="adj-list" class="space-y-3"></div>
                </div>
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-rose-500">
                    <span class="text-rose-400 font-black uppercase text-[10px] mb-6 block">Trạng từ (Adv)</span>
                    <div id="adv-list" class="space-y-3"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNZlPQMDzCebPOY5Se0OpFsh7AkheZMOk",
            authDomain: "wordform-477a3.firebaseapp.com",
            projectId: "wordform-477a3",
            storageBucket: "wordform-477a3.firebasestorage.app",
            messagingSenderId: "152774885997",
            appId: "1:152774885997:web:6832dd5436282cb225f564"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let user = null;

        async function authAction(t) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { t === 'reg' ? await auth.createUserWithEmailAndPassword(e, p) : await auth.signInWithEmailAndPassword(e, p); } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(u => {
            user = u;
            document.getElementById('authOverlay').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
        });

        async function findWF() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if (!word) return;
            
            try {
                const [dictRes, derRes, suffixRes] = await Promise.all([
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null),
                    fetch(`https://api.datamuse.com/words?rel_der=${word}&md=p&max=50`).then(r => r.json()),
                    fetch(`https://api.datamuse.com/words?sp=${word}*&md=p&max=50`).then(r => r.json())
                ]);

                render(word, dictRes ? dictRes[0] : null, [...derRes, ...suffixRes]);
            } catch (e) { console.error(e); }
        }

        function render(word, dict, rawData) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('rootWord').innerText = word;
            document.getElementById('ipa').innerText = dict?.phonetic || '';

            const wf = { v: new Set(), n: new Set(), adj: new Set(), adv: new Set() };

            rawData.forEach(item => {
                const w = item.word.toLowerCase();
                if (!w.includes(word.substring(0, 3))) return; // Lọc bỏ từ rác hoàn toàn

                // HỆ THỐNG PHÂN LOẠI ƯU TIÊN THEO HẬU TỐ (SUFFIX)
                if (w.endsWith('ly')) {
                    wf.adv.add(w);
                } else if (w.endsWith('able') || w.endsWith('ible') || w.endsWith('ate') || w.endsWith('ive') || w.endsWith('ous') || w.endsWith('ful') || w.endsWith('less') || w.endsWith('al') || w.endsWith('ic') || w.endsWith('ed')) {
                    // Nếu kết thúc bằng 'ate', kiểm tra xem API có bảo là Verb không, nếu không mặc định là Adj
                    if (w.endsWith('ate') && item.tags?.includes('v')) wf.v.add(w);
                    else wf.adj.add(w);
                } else if (w.endsWith('tion') || w.endsWith('ment') || w.endsWith('ness') || w.endsWith('ity') || w.endsWith('ance') || w.endsWith('ence') || w.endsWith('er') || w.endsWith('or') || w.endsWith('ship')) {
                    wf.n.add(w);
                } else if (item.tags?.includes('v')) {
                    wf.v.add(w);
                } else if (item.tags?.includes('n')) {
                    wf.n.add(w);
                }
            });

            // Đảm bảo từ gốc nằm đúng vị trí từ điển
            dict?.meanings.forEach(m => {
                const p = m.partOfSpeech.toLowerCase();
                if (p.includes('verb')) wf.v.add(word);
                if (p.includes('noun')) wf.n.add(word);
                if (p.includes('adj')) wf.adj.add(word);
                if (p.includes('adv')) wf.adv.add(word);
            });

            const draw = (id, set) => {
                const list = [...set].sort((a, b) => a.length - b.length);
                document.getElementById(`${id}-list`).innerHTML = list.length 
                    ? list.map(w => `<div class="word-card bg-white/5 p-4 rounded-xl border border-white/5 font-bold text-indigo-50">${w}</div>`).join('')
                    : `<p class="text-gray-700 italic text-xs text-center py-4">No data</p>`;
            };

            draw('v', wf.v); draw('n', wf.n); draw('adj', wf.adj); draw('adv', wf.adv);
        }
    </script>
</body>
</html>
