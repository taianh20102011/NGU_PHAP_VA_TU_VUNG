<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordFamily Pro - Morphology Dictionary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .word-card {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
    </style>
</head>

<body class="min-h-screen">

    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-xl">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
            <h2 class="text-3xl font-extrabold mb-2 tracking-tighter">WF<span class="text-indigo-500">.PRO</span></h2>
            <p class="text-gray-400 text-xs mb-8 uppercase tracking-widest">Morphology Tool</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-3 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 ring-indigo-500/50">
            <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 mb-8 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-2 ring-indigo-500/50">
            <div class="flex gap-3">
                <button onclick="authAction('login')" class="flex-1 bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-500/20">Vào App</button>
                <button onclick="authAction('reg')" class="flex-1 border border-white/10 hover:bg-white/5 p-4 rounded-2xl transition-all">Đăng ký</button>
            </div>
            <p id="msg" class="text-xs mt-4 text-rose-400"></p>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-8 mb-16">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter">WORD<span class="text-indigo-500">FAMILY</span></h1>
                <p class="text-gray-500 text-sm">Tra cứu gốc từ và các dạng biến thể hình thái học</p>
            </div>

            <div class="relative w-full md:w-[450px]">
                <input type="text" id="wordInput" onkeypress="if(event.key==='Enter') findWF()" 
                    placeholder="Nhập từ gốc (vd: success, beauty)..."
                    class="w-full p-5 pl-7 bg-white/5 border border-white/10 rounded-[2rem] outline-none focus:ring-4 ring-indigo-500/20 text-lg transition-all">
                <button onclick="findWF()" class="absolute right-3 top-3 bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2.5 rounded-[1.5rem] font-bold shadow-lg shadow-indigo-500/20 transition-all">
                    Phân tích
                </button>
            </div>
            
            <button onclick="firebase.auth().signOut()" class="text-xs text-gray-500 hover:text-white transition-colors">Đăng xuất</button>
        </header>

        <section id="results" class="hidden">
            <div class="mb-12 text-center">
                <h2 id="rootWord" class="text-7xl font-black uppercase tracking-tighter text-white mb-4"></h2>
                <div class="flex justify-center items-center gap-4">
                    <span id="ipa" class="text-xl text-indigo-300/60 font-medium italic"></span>
                    <button id="audioBtn" onclick="playAudio()" class="p-3 bg-white/5 hover:bg-white/10 rounded-full transition-all border border-white/10">
                        🔊
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-indigo-500">
                    <span class="px-4 py-1 bg-indigo-500/10 text-indigo-400 text-[10px] font-black rounded-lg uppercase tracking-widest mb-6 inline-block">Động từ</span>
                    <div id="v-list" class="space-y-3"></div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-emerald-500">
                    <span class="px-4 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] font-black rounded-lg uppercase tracking-widest mb-6 inline-block">Danh từ</span>
                    <div id="n-list" class="space-y-3"></div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-amber-500">
                    <span class="px-4 py-1 bg-amber-500/10 text-amber-400 text-[10px] font-black rounded-lg uppercase tracking-widest mb-6 inline-block">Tính từ</span>
                    <div id="adj-list" class="space-y-3"></div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-rose-500">
                    <span class="px-4 py-1 bg-rose-500/10 text-rose-400 text-[10px] font-black rounded-lg uppercase tracking-widest mb-6 inline-block">Trạng từ</span>
                    <div id="adv-list" class="space-y-3"></div>
                </div>
            </div>

            <div class="mt-20 pt-10 border-t border-white/5">
                <h3 class="text-[10px] font-black text-gray-600 uppercase mb-6 tracking-widest">Lịch sử tra từ</h3>
                <div id="history" class="flex flex-wrap gap-3"></div>
            </div>
        </section>
    </div>

    <script>
        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDNZlPQMDzCebPOY5Se0OpFsh7AkheZMOk",
            authDomain: "wordform-477a3.firebaseapp.com",
            projectId: "wordform-477a3",
            storageBucket: "wordform-477a3.firebasestorage.app",
            messagingSenderId: "152774885997",
            appId: "1:152774885997:web:6832dd5436282cb225f564"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let player = null, user = null;

        // AUTH
        async function authAction(t) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try {
                if (t === 'reg') await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch (err) { document.getElementById('msg').innerText = err.message; }
        }

        auth.onAuthStateChanged(u => {
            user = u;
            document.getElementById('authOverlay').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            if (u) loadHistory();
        });

        // CORE LOGIC
        async function findWF() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if (!word) return;

            document.getElementById('rootWord').innerText = "...";

            try {
                const [dictRes, derRes] = await Promise.all([
                    fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null),
                    fetch(`https://api.datamuse.com/words?rel_der=${word}&md=p&max=50`).then(r => r.json())
                ]);

                render(word, dictRes ? dictRes[0] : null, derRes);
                saveHistory(word);
            } catch (error) {
                console.error("Lỗi:", error);
            }
        }

        function render(word, dict, derData) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('rootWord').innerText = word;
            
            // Phonetic & Audio
            document.getElementById('ipa').innerText = dict?.phonetic || dict?.phonetics?.find(p => p.text)?.text || '';
            const audioSrc = dict?.phonetics?.find(p => p.audio !== '')?.audio;
            player = audioSrc ? new Audio(audioSrc) : null;
            document.getElementById('audioBtn').style.opacity = player ? '1' : '0.2';

            const wf = { v: [], n: [], adj: [], adv: [] };

            // 1. Phân loại từ gốc từ Dictionary
            dict?.meanings.forEach(m => {
                const pos = m.partOfSpeech.toLowerCase();
                if (pos.includes('verb')) wf.v.push(word);
                if (pos.includes('noun')) wf.n.push(word);
                if (pos.includes('adj')) wf.adj.push(word);
                if (pos.includes('adv')) wf.adv.push(word);
            });

            // 2. Lọc thông minh (Strict Filter)
            derData.forEach(item => {
                const w = item.word.toLowerCase();
                
                // Điều kiện Word Family: Phải chứa gốc từ (vd: pressure chứa press)
                // Hoặc bắt đầu bằng ít nhất 80% chiều dài từ gốc (tránh president vs pressure)
                const isStrictFamily = w.includes(word) || (word.length > 3 && w.startsWith(word.substring(0, Math.floor(word.length * 0.8))));

                if (isStrictFamily && item.tags) {
                    if (item.tags.includes('v')) wf.v.push(w);
                    if (item.tags.includes('n')) wf.n.push(w);
                    if (item.tags.includes('adj')) wf.adj.push(w);
                    if (item.tags.includes('adv')) wf.adv.push(w);
                }
            });

            const updateUI = (id, list) => {
                const cleanList = [...new Set(list)].sort((a, b) => a.length - b.length);
                document.getElementById(`${id}-list`).innerHTML = cleanList.length > 0 
                    ? cleanList.map((w, index) => `
                        <div class="word-card bg-white/5 p-4 rounded-xl border border-white/5 hover:border-indigo-500/50 transition-all cursor-pointer" 
                             style="animation-delay: ${index * 0.05}s"
                             onclick="document.getElementById('wordInput').value='${w}';findWF()">
                            <span class="font-bold text-indigo-100">${w}</span>
                        </div>
                    `).join('')
                    : `<p class="text-gray-700 italic text-xs text-center py-6">No data found</p>`;
            };

            updateUI('v', wf.v); updateUI('n', wf.n); updateUI('adj', wf.adj); updateUI('adv', wf.adv);
        }

        // UTILS
        function playAudio() { player?.play(); }

        async function saveHistory(word) {
            if (!user) return;
            await db.collection("users").doc(user.uid).collection("history").doc(word).set({
                word, time: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function loadHistory() {
            db.collection("users").doc(user.uid).collection("history").orderBy("time", "desc").limit(10).onSnapshot(s => {
                document.getElementById('history').innerHTML = s.docs.map(d =>
                    `<button onclick="document.getElementById('wordInput').value='${d.data().word}';findWF()" 
                        class="px-4 py-2 bg-white/5 rounded-full text-xs border border-white/10 hover:bg-indigo-500 transition-all text-gray-400 hover:text-white">
                        ${d.data().word}
                    </button>`
                ).join('');
            });
        }
    </script>
</body>

</html>
