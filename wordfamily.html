<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordForm Master Cloud - Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100" id="mainBody">

    <div id="authSection" class="auth-container">
        <div class="glass p-10 rounded-3xl w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-center tracking-tighter italic">WF <span class="text-indigo-500">CLOUD</span></h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none focus:border-indigo-500 transition-all">
                <input type="password" id="password" placeholder="Mật khẩu" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 outline-none focus:border-indigo-500 transition-all">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold transition-all">Đăng nhập</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-white/10 hover:bg-white/20 p-4 rounded-xl font-bold transition-all border border-white/10">Đăng ký</button>
                </div>
            </div>
            <p id="authError" class="mt-4 text-rose-400 text-sm text-center font-medium"></p>
        </div>
    </div>

    <div id="appSection" class="hidden min-h-screen p-4 lg:p-10">
        <div class="max-w-7xl mx-auto">
            <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                <div class="flex items-center gap-6">
                    <div class="text-left">
                        <h1 class="text-3xl font-black tracking-tighter">WF <span class="text-indigo-400">DASHBOARD</span></h1>
                        <p id="userEmail" class="text-xs text-slate-400 font-bold uppercase tracking-widest"></p>
                    </div>
                    <button onclick="logout()" class="text-xs bg-rose-500/10 text-rose-500 px-3 py-1 rounded-full border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">Đăng xuất</button>
                </div>

                <div class="flex gap-2">
                    <button onclick="changeTheme('#0f172a')" class="w-8 h-8 rounded-full bg-slate-900 border-2 border-white"></button>
                    <button onclick="changeTheme('#1e1b4b')" class="w-8 h-8 rounded-full bg-indigo-950 border-2 border-white"></button>
                    <button onclick="changeTheme('#064e3b')" class="w-8 h-8 rounded-full bg-emerald-950 border-2 border-white"></button>
                </div>

                <div class="flex w-full md:w-auto gap-2 bg-white/5 p-2 rounded-2xl border border-white/10">
                    <input type="text" id="wordInput" placeholder="Tra từ nhanh..." class="bg-transparent border-none outline-none px-4 py-2 text-white">
                    <button onclick="searchWord()" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold">Tra</button>
                </div>
            </header>

            <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="glass p-6 rounded-2xl border-t-2 border-blue-500">
                    <h3 class="text-blue-400 text-xs font-black uppercase mb-4">Verb</h3>
                    <div id="v-box" class="space-y-2 font-bold"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-emerald-500">
                    <h3 class="text-emerald-400 text-xs font-black uppercase mb-4">Noun</h3>
                    <div id="n-box" class="space-y-2 font-bold"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-amber-500">
                    <h3 class="text-amber-400 text-xs font-black uppercase mb-4">Adjective</h3>
                    <div id="adj-box" class="space-y-2 font-bold"></div>
                </div>
                <div class="glass p-6 rounded-2xl border-t-2 border-rose-500">
                    <h3 class="text-rose-400 text-xs font-black uppercase mb-4">Adverb</h3>
                    <div id="adv-box" class="space-y-2 font-bold"></div>
                </div>

                <div class="lg:col-span-3 glass p-8 rounded-3xl">
                    <div id="resultContent" class="hidden">
                        <div class="flex justify-between items-center mb-8">
                            <h2 id="displayWord" class="text-5xl font-black uppercase italic tracking-tighter"></h2>
                            <button onclick="playAudio()" id="audioBtn" class="p-4 bg-indigo-500/20 rounded-full">🔊</button>
                        </div>
                        <div id="meaningBox" class="space-y-4 opacity-80"></div>
                        
                        <div class="mt-10 bg-indigo-600 p-8 rounded-3xl">
                            <h4 class="text-xl font-black mb-4 underline">QUIZ TIME 🧠</h4>
                            <div id="quizContainer" class="space-y-4"></div>
                            <button onclick="checkQuiz()" class="mt-6 w-full bg-white text-indigo-600 py-3 rounded-xl font-black uppercase">Kiểm tra</button>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-3xl">
                    <h3 class="text-xl font-black mb-6">Cloud History</h3>
                    <div id="historyList" class="space-y-2 max-h-96 overflow-y-auto"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- CONFIG FIREBASE ---
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
          apiKey: "AIzaSyDNZlPQMDzCebPOY5Se0OpFsh7AkheZMOk",
          authDomain: "wordform-477a3.firebaseapp.com",
          projectId: "wordform-477a3",
          storageBucket: "wordform-477a3.firebasestorage.app",
          messagingSenderId: "152774885997",
          appId: "1:152774885997:web:6832dd5436282cb225f564",
          measurementId: "G-2G02ZGKPTT"
        };
                
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentAudio = null;
        let activeWord = "";

        // AUTH LOGIC
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('authError');
            try {
                if (type === 'register') await auth.createUserWithEmailAndPassword(email, pass);
                else await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) { errorEl.innerText = e.message; }
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                document.getElementById('userEmail').innerText = user.email;
                loadHistory();
            } else {
                currentUser = null;
                document.getElementById('authSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
            }
        });

        // SEARCH & RENDER
        async function searchWord() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if(!word) return;
            activeWord = word;

            const [dictRes, dmRes] = await Promise.all([
                fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`).then(r => r.ok ? r.json() : null),
                fetch(`https://api.datamuse.com/words?ml=${word}&md=p&max=20`).then(r => r.json())
            ]);

            if(dictRes) render(dictRes[0], dmRes);
            saveHistory(word);
        }

        function render(data, related) {
            document.getElementById('resultContent').classList.remove('hidden');
            document.getElementById('displayWord').innerText = data.word;
            
            const boxes = { v: [], n: [], adj: [], adv: [] };
            data.meanings.forEach(m => {
                const p = m.partOfSpeech.toLowerCase();
                if(p.includes('verb')) boxes.v.push(data.word);
                if(p.includes('noun')) boxes.n.push(data.word);
                if(p.includes('adj')) boxes.adj.push(data.word);
                if(p.includes('adv')) boxes.adv.push(data.word);
            });

            related.forEach(item => {
                if(item.tags) {
                    if(item.tags.includes('v')) boxes.v.push(item.word);
                    if(item.tags.includes('n')) boxes.n.push(item.word);
                    if(item.tags.includes('adj')) boxes.adj.push(item.word);
                    if(item.tags.includes('adv')) boxes.adv.push(item.word);
                }
            });

            const fillBox = (id, list) => {
                const unique = [...new Set(list)].slice(0, 3);
                document.getElementById(`${id}-box`).innerHTML = unique.map(w => `<div class="bg-white/5 p-2 rounded-lg mb-1 capitalize">${w}</div>`).join('') || '<span class="text-slate-600">None</span>';
            };
            ['v', 'n', 'adj', 'adv'].forEach(k => fillBox(k, boxes[k]));

            document.getElementById('meaningBox').innerHTML = data.meanings.map(m => `<div><b class="text-indigo-400 uppercase">[${m.partOfSpeech}]</b> ${m.definitions[0].definition}</div>`).join('');
            
            const audioSrc = data.phonetics.find(p => p.audio)?.audio;
            currentAudio = audioSrc ? new Audio(audioSrc) : null;

            // Generate Quiz
            document.getElementById('quizContainer').innerHTML = data.meanings.slice(0, 1).map(m => `
                <div class="text-sm">Give the correct form of <b class="uppercase">${activeWord}</b> (${m.partOfSpeech}):</div>
                <input type="text" id="qInput" class="w-full p-4 bg-black/20 rounded-xl outline-none border-2 border-transparent focus:border-white text-white font-bold">
            `).join('');
        }

        function checkQuiz() {
            const ans = document.getElementById('qInput').value.trim().toLowerCase();
            alert(ans === activeWord ? "CHÍNH XÁC! 🌟" : `SAI RỒI! ĐÁP ÁN: ${activeWord}`);
        }

        function playAudio() { if(currentAudio) currentAudio.play(); }
        function changeTheme(c) { document.getElementById('mainBody').style.backgroundColor = c; }

        // FIREBASE SYNC
        async function saveHistory(word) {
            if(!currentUser) return;
            await db.collection("users").doc(currentUser.uid).collection("history").add({
                word, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function loadHistory() {
            db.collection("users").doc(currentUser.uid).collection("history")
              .orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {
                document.getElementById('historyList').innerHTML = snap.docs.map(doc => `
                    <div onclick="document.getElementById('wordInput').value='${doc.data().word}';searchWord()" 
                         class="p-3 bg-white/5 hover:bg-indigo-500/20 rounded-xl cursor-pointer border border-white/5 mb-2 capitalize text-sm">
                        ${doc.data().word}
                    </div>
                `).join('');
            });
        }
    </script>
</body>
</html>
